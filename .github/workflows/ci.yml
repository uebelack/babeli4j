name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check formatting
        run: mvn spotless:check

      - name: Build and test
        run: mvn clean verify

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          files: babeli-core/target/site/jacoco/jacoco.xml babeli-ai/target/site/jacoco/jacoco.xml
          format: jacoco
